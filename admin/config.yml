# config.yml

backend:
  name: git-gateway
  branch: master
media_folder: 'images'
public_folder: '/images'
collections:
  - name: 'pages'
    label: 'Pages'
    editor:
      preview: false
    files:
      - label: 'Home'
        name: 'homepg'
        file: '/index.html'
        fields:
          - {label: 'Layout', name: 'layout', widget: 'hidden', default: 'default'}
          - {label: 'Title', name: 'title', widget: 'string', default: 'about'}
          - {label: 'Meta Description', name: 'description', widget: 'string', default: ''} 
          - {label: 'Body', name: 'body', widget: 'markdown'}
      - label: 'About'
        name: 'about'
        file: '/about/index.html'
        fields:
          - {label: 'Layout', name: 'layout', widget: 'hidden', default: 'default'}
          - {label: 'Title', name: 'title', widget: 'string', default: 'about'}
          - {label: 'Meta Description', name: 'description', widget: 'string', default: ''} 
          - {label: 'Body', name: 'body', widget: 'markdown'}
      - label: 'Insurance'
        name: 'insurance'
        file: '/about/insurance.html'
        fields:
          - {label: 'Layout', name: 'layout', widget: 'hidden', default: 'default'}
          - {label: 'Title', name: 'title', widget: 'string', default: 'about'}
          - {label: 'Meta Description', name: 'description', widget: 'string', default: ''} 
          - {label: 'Body', name: 'body', widget: 'markdown'}
      - label: 'Insurance'
        name: 'insurance'
        file: '/about/insurance.html'
        fields:
          - {label: 'Layout', name: 'layout', widget: 'hidden', default: 'default'}
          - {label: 'Title', name: 'title', widget: 'string', default: 'about'}
          - {label: 'Meta Description', name: 'description', widget: 'string', default: ''} 
          - {label: 'Body', name: 'body', widget: 'markdown'}