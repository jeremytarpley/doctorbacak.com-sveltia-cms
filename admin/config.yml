local_backend: true

backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "home"
    label: "Home Page"
    files:
      - name: "home"
        label: "Home Page"
        file: "content/pages/home.md"
        fields:
          - { label: "SEO Title", name: "title", widget: "string" }
          - { label: "SEO Description", name: "description", widget: "text" }
          - { label: "Main Heading", name: "heading", widget: "string" }
          - { label: "Providers Line", name: "providers", widget: "string" }
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "Services Section", name: "services_body", widget: "markdown" }
          - { label: "Services Button Text", name: "services_cta", widget: "string" }
          - { label: "Patients Section", name: "patients_body", widget: "markdown" }
          - { label: "Patients Button Text", name: "patients_cta", widget: "string" }

  - name: "pages"
    label: "Pages"
    files:
      - name: "about"
        label: "About"
        file: "content/pages/about.md"
        fields:
          - { label: "SEO Title", name: "title", widget: "string" }
          - { label: "SEO Description", name: "description", widget: "text" }
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - name: "about-team"
        label: "Team"
        file: "content/pages/about-team.md"
        fields:
          - { label: "SEO Title", name: "title", widget: "string" }
          - { label: "SEO Description", name: "description", widget: "text" }
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - name: "about-insurance"
        label: "Insurance"
        file: "content/pages/about-insurance.md"
        fields:
          - { label: "SEO Title", name: "title", widget: "string" }
          - { label: "SEO Description", name: "description", widget: "text" }
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - name: "about-services"
        label: "Services"
        file: "content/pages/about-services.md"
        fields:
          - { label: "SEO Title", name: "title", widget: "string" }
          - { label: "SEO Description", name: "description", widget: "text" }
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - name: "contact"
        label: "Contact"
        file: "content/pages/contact.md"
        fields:
          - { label: "SEO Title", name: "title", widget: "string" }
          - { label: "SEO Description", name: "description", widget: "text" }
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - name: "patients"
        label: "Patient Resources"
        file: "content/pages/patients.md"
        fields:
          - { label: "SEO Title", name: "title", widget: "string" }
          - { label: "SEO Description", name: "description", widget: "text" }
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
